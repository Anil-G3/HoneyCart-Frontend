<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="95" fill="#0D4B47"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#F5C548" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="100" cy="100" r="87" fill="none" stroke="#5EEAD4" stroke-width="0.8" opacity="0.4"/>

  <!-- Body -->
  <ellipse cx="100" cy="118" rx="20" ry="28" fill="#F5C548"/>
  <!-- Stripes -->
  <rect x="91" y="105" width="7" height="26" rx="2" fill="#041E1B"/>
  <rect x="102" y="105" width="7" height="26" rx="2" fill="#041E1B"/>

  <!-- Wings -->
  <ellipse cx="80" cy="98" rx="20" ry="10" fill="rgba(255,255,255,0.65)" transform="rotate(-30,80,98)"/>
  <ellipse cx="120" cy="98" rx="20" ry="10" fill="rgba(255,255,255,0.65)" transform="rotate(30,120,98)"/>

  <!-- Head -->
  <circle cx="100" cy="88" r="13" fill="#041E1B"/>
  <circle cx="104" cy="84" r="3.5" fill="white"/>
  <circle cx="105" cy="84" r="1.5" fill="#041E1B"/>

  <!-- Antennae -->
  <line x1="93" y1="77" x2="85" y2="64" stroke="#5EEAD4" stroke-width="2" stroke-linecap="round"/>
  <circle cx="84" cy="62" r="4" fill="#F5C548"/>
  <line x1="100" y1="75" x2="100" y2="62" stroke="#5EEAD4" stroke-width="2" stroke-linecap="round"/>
  <circle cx="100" cy="60" r="4" fill="#F5C548"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#5EEAD4" stroke-width="2"/>
</svg>
